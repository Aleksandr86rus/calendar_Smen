    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root {
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #888888;
            --night: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
            --day: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%);
            --vac: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            --off: rgba(255, 255, 255, 0.03);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: env(safe-area-inset-top) 16px 40px;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 50%);
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .bento-header { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 20px 0 30px; }
        .bento-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; backdrop-filter: blur(10px); }
        h1 { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 4px; }
        .user-label { color: var(--text-dim); font-size: 0.9rem; }
        .vacation-widget { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1) 0%, transparent 100%); display: flex; align-items: center; gap: 12px; border-color: rgba(245, 158, 11, 0.2); }
        .vac-days { font-weight: 800; color: #F59E0B; font-size: 1.2rem; }
        .legend-mini { display: flex; justify-content: space-between; background: var(--surface); padding: 12px 20px; border-radius: 100px; border: 1px solid var(--border); margin-bottom: 25px; }
        .l-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: var(--text-dim); }
        .l-dot { width: 8px; height: 8px; border-radius: 50%; }
        .month-box { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; margin-bottom: 16px; }
        .month-trigger { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .month-title { font-weight: 700; font-size: 1.1rem; }
        .month-box.collapsed { opacity: 0.4; transform: scale(0.98); }
        .month-box.collapsed .month-content { display: none; }
        .month-content { padding: 0 20px 24px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .w-day { text-align: center; color: var(--text-dim); font-size: 0.65rem; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        .d-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-size: 0.9rem; font-weight: 600; background: var(--off); position: relative; }
        .d-cell.night { background: var(--night); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .d-cell.day-sh { background: var(--day); box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3); }
        .d-cell.vacation { background: var(--vac); }
        .today-mark { position: absolute; top: -4px; right: -4px; width: 12px; height: 12px; background: #fff; border: 3px solid var(--bg); border-radius: 50%; }
    </style>
</head>
<body>

    <div class="container">
        <div class="bento-header">
            <div class="bento-card">
                <div class="user-label">График смен 2026</div>
                <h1>Александр Аристархов</h1>
            </div>
            <div id="vac-widget" class="bento-card vacation-widget">
                <span style="font-size:1.5rem">🏖️</span>
                <div>
                    <div class="user-label" id="vac-label">До отпуска</div>
                    <div class="vac-days" id="vac-count">--</div>
                </div>
            </div>
        </div>

        <div class="legend-mini">
            <div class="l-item"><span class="l-dot" style="background: var(--night)"></span> Ночь</div>
            <div class="l-item"><span class="l-dot" style="background: var(--day)"></span> День</div>
            <div class="l-item"><span class="l-dot" style="background: var(--vac)"></span> Отпуск</div>
            <div class="l-item"><span class="l-dot" style="background: var(--border)"></span> Вых</div>
        </div>

        <div id="calendar-mount"></div>
    </div>

    <script>
        // РЕГИСТРАЦИЯ SW ИЗ ФАЙЛА
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/calendar_Smen/sw.js')
                .then(reg => console.log('SW OK'))
                .catch(err => console.log('SW FAIL', err));
            });
        }

        const YEAR = 2026;
        const START_DATE = new Date(2026, 0, 1);
        const TODAY = new Date(); TODAY.setHours(0,0,0,0);

        const VACATIONS = [
            { start: new Date(2026, 0, 15), end: new Date(2026, 0, 28) },
            { start: new Date(2026, 6, 16), end: new Date(2026, 7, 1) },
            { start: new Date(2026, 10, 20), end: new Date(2026, 11, 2) }
        ];

        function getShiftType(date) {
            if (VACATIONS.some(v => date >= v.start && date <= v.end)) return 'vacation';
            const diff = Math.round((date - START_DATE) / 86400000);
            const cycle = diff % 56;
            if (cycle >= 0 && cycle <= 13) return 'night';
            if (cycle >= 28 && cycle <= 41) return 'day-sh';
            return 'off';
        }

        function render() {
            const mount = document.getElementById('calendar-mount');
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];

            months.forEach((name, i) => {
                const monthLastDay = new Date(YEAR, i + 1, 0);
                const isPast = monthLastDay < TODAY;
                const box = document.createElement('div');
                box.className = `month-box ${isPast ? 'collapsed' : ''}`;
                
                let html = `
                    <div class="month-trigger" onclick="this.parentElement.classList.toggle('collapsed')">
                        <span class="month-title">${name}</span>
                        <span style="opacity: 0.3">${isPast ? '●' : '▾'}</span>
                    </div>
                    <div class="month-content">
                        <div class="calendar-grid">
                            ${['пн','вт','ср','чт','пт','сб','вс'].map(d => `<div class="w-day">${d}</div>`).join('')}`;

                const first = new Date(YEAR, i, 1).getDay();
                const offset = first === 0 ? 6 : first - 1;
                for(let e=0; e<offset; e++) html += `<div></div>`;

                for(let d=1; d<=monthLastDay.getDate(); d++) {
                    const cur = new Date(YEAR, i, d);
                    const type = getShiftType(cur);
                    const isToday = cur.getTime() === TODAY.getTime();
                    html += `<div class="d-cell ${type}">${d}${isToday ? '<div class="today-mark"></div>' : ''}</div>`;
                }
                box.innerHTML = html + `</div></div>`;
                mount.appendChild(box);
                if(TODAY.getMonth() === i && !isPast) {
                    setTimeout(() => box.scrollIntoView({behavior: 'smooth', block: 'center'}), 200);
                }
            });
        }

        const next = VACATIONS.find(v => v.start > TODAY);
        const currentVac = VACATIONS.find(v => TODAY >= v.start && TODAY <= v.end);
        if (currentVac) {
            document.getElementById('vac-label').innerText = 'В отпуске еще';
            document.getElementById('vac-count').innerText = Math.ceil((currentVac.end - TODAY)/86400000) + ' дн.';
        } else if (next) {
            document.getElementById('vac-count').innerText = Math.ceil((next.start - TODAY)/86400000) + ' дн.';
        }
        render();
    </script>
</body>
