    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --color-night: #8b5cf6;
            --color-day: #06b6d4;
            --color-vacation: #f59e0b;
            --today-glow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; text-align: center; }

        .vacation-countdown {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid var(--color-vacation);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 12px;
            background: var(--glass-bg);
            border-radius: 16px;
        }

        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        .month-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            margin-bottom: 15px;
            overflow: hidden;
            text-align: left;
        }

        .month-header {
            padding: 15px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-name {
            font-size: 1.1rem;
            font-weight: 700;
            border-left: 4px solid var(--color-day);
            padding-left: 15px;
            text-transform: capitalize;
        }

        .month-card.collapsed .month-body { max-height: 0; opacity: 0; padding: 0; overflow: hidden; }
        .month-card.collapsed { opacity: 0.5; }
        .month-body { padding: 20px; }

        .days-header, .days-body { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .weekday { text-align: center; font-size: 0.7rem; color: var(--text-muted); font-weight: bold; margin-bottom: 10px; }

        .day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border-radius: 8px;
        }

        .shift-night { background: var(--color-night); color: white; }
        .shift-day { background: var(--color-day); color: white; }
        .shift-vacation { background: var(--color-vacation); color: white; }
        .shift-off { color: var(--text-muted); }
        .is-today { outline: 2px solid #fff; box-shadow: var(--today-glow); font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin-bottom: 5px;">Мой График 2026</h1>
        <div id="vacation-timer" class="vacation-countdown">...</div>
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background: var(--color-night)"></span> Ночь</div>
            <div class="legend-item"><span class="dot" style="background: var(--color-day)"></span> День</div>
            <div class="legend-item"><span class="dot" style="background: var(--color-vacation)"></span> Отпуск</div>
            <div class="legend-item"><span class="dot" style="border:1px solid #777"></span> Выходной</div>
        </div>
    </header>

    <div id="calendar-root"></div>
</div>

<script>
    // 1. Service Worker для работы офлайн
    if ('serviceWorker' in navigator) {
        const sw = `
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
        `;
        const blob = new Blob([sw], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    // 2. Логика календаря
    const YEAR = 2026;
    const START_DATE = new Date(2026, 0, 1);
    const TODAY = new Date(); TODAY.setHours(0,0,0,0);

    const VACATIONS = [
        { start: new Date(2026, 0, 15), end: new Date(2026, 0, 28) },
        { start: new Date(2026, 6, 16), end: new Date(2026, 7, 1) },
        { start: new Date(2026, 10, 20), end: new Date(2026, 11, 2) }
    ];

    function getShiftClass(date) {
        const isVac = VACATIONS.some(v => date >= v.start && date <= v.end);
        if (isVac) return 'shift-vacation';
        const diffDays = Math.floor((date - START_DATE) / 86400000);
        const cycleDay = diffDays % 56;
        if (cycleDay >= 0 && cycleDay <= 13) return 'shift-night';
        if (cycleDay >= 14 && cycleDay <= 27) return 'shift-off';
        if (cycleDay >= 28 && cycleDay <= 41) return 'shift-day';
        return 'shift-off';
    }

    function createCalendar() {
        const root = document.getElementById('calendar-root');
        const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];

        months.forEach((name, i) => {
            const card = document.createElement('div');
            const isPast = new Date(YEAR, i + 1, 0) < TODAY;
            card.className = `month-card ${isPast ? 'collapsed' : ''}`;
            
            let html = `
                <div class="month-header" onclick="this.parentElement.classList.toggle('collapsed')">
                    <div class="month-name">${name}</div>
                    <div style="font-size:0.8rem; color:var(--text-muted)">${isPast ? 'Развернуть' : 'Свернуть'}</div>
                </div>
                <div class="month-body">
                    <div class="days-header">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div class="weekday">${d}</div>`).join('')}</div>
                    <div class="days-body">`;

            const firstDay = new Date(YEAR, i, 1).getDay();
            const shiftStart = firstDay === 0 ? 6 : firstDay - 1;
            for (let e = 0; e < shiftStart; e++) html += `<div></div>`;

            const daysInMonth = new Date(YEAR, i + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const curDate = new Date(YEAR, i, d);
                const shift = getShiftClass(curDate);
                const todayClass = curDate.getTime() === TODAY.getTime() ? 'is-today' : '';
                html += `<div class="day ${shift} ${todayClass}">${d}</div>`;
            }
            card.innerHTML = html + `</div></div>`;
            root.appendChild(card);
        });
    }

    // Таймер отпуска
    const nextVac = VACATIONS.find(v => v.start > TODAY);
    const inVac = VACATIONS.find(v => TODAY >= v.start && TODAY <= v.end);
    if (inVac) {
        document.getElementById('vacation-timer').innerHTML = `🌴 В отпуске! Осталось: <b>${Math.ceil((inVac.end - TODAY)/86400000)} дн.</b>`;
    } else if (nextVac) {
        document.getElementById('vacation-timer').innerHTML = `⏳ До отпуска: <b>${Math.ceil((nextVac.start - TODAY)/86400000)} дн.</b>`;
    }

    createCalendar();
</script>
</body>
