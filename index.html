<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Work Shift 2026 Elite</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #000000;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #666666;
            --night: linear-gradient(135deg, #7C3AED 0%, #4C1D95 100%);
            --day: linear-gradient(135deg, #0EA5E9 0%, #0369A1 100%);
            --vac: linear-gradient(135deg, #F59E0B 0%, #B45309 100%);
            --off: rgba(255, 255, 255, 0.02);
            --accent: #8B5CF6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: env(safe-area-inset-top) 16px 100px;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #000000 70%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .bento-header { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 20px 0 30px; }

        .bento-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; margin-top: 4px; }
        .user-label { color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .vacation-widget {
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.05) 0%, transparent 100%);
            display: flex; align-items: center; gap: 16px; border-color: rgba(245, 158, 11, 0.15);
        }

        .vac-icon { font-size: 1.8rem; filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5)); }
        .vac-days { font-weight: 800; color: #F59E0B; font-size: 1.4rem; }

        .legend-mini {
            display: flex; justify-content: space-around; background: var(--surface);
            padding: 14px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px;
        }

        .l-item { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); }
        .l-dot { width: 10px; height: 10px; border-radius: 3px; }

        .month-box {
            background: var(--surface); border: 1px solid var(--border); border-radius: 32px;
            margin-bottom: 20px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .month-trigger { padding: 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .month-title { font-weight: 700; font-size: 1.2rem; }
        .month-box.collapsed { opacity: 0.3; transform: scale(0.96); filter: grayscale(0.8); }
        .month-box.collapsed .month-content { display: none; }
        .month-content { padding: 0 20px 24px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .w-day { text-align: center; color: var(--text-dim); font-size: 0.6rem; font-weight: 800; margin-bottom: 12px; }
        .d-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 16px; font-size: 0.95rem; font-weight: 700; background: var(--off);
            position: relative; transition: transform 0.2s;
        }

        .d-cell.night { background: var(--night); box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4); }
        .d-cell.day-sh { background: var(--day); box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4); }
        .d-cell.vacation { background: var(--vac); box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3); }
        .today-mark { position: absolute; bottom: 6px; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 8px #fff; }

        /* Стили уведомлений и кнопок */
        #pwa-hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 24px; border-radius: 100px;
            font-size: 0.9rem; font-weight: 700; white-space: nowrap; z-index: 1000;
            display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #install-btn {
            display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--night); color: white; padding: 16px 32px; 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 100px; 
            font-weight: 800; z-index: 2000; box-shadow: 0 10px 30px rgba(124, 58, 237, 0.6);
            cursor: pointer; font-family: inherit; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="pwa-hint">📲 Нажми «Поделиться» → На экран «Домой»</div>
    <button id="install-btn">📲 Установить график</button>

    <div class="container">
        <div class="bento-header">
            <div class="bento-card">
                <div class="user-label">Сменный график 2026</div>
                <h1>Александр Аристархов</h1>
            </div>
            
            <div id="vac-widget" class="bento-card vacation-widget">
                <span class="vac-icon" id="vac-emoji">⏳</span>
                <div>
                    <div class="user-label" id="vac-label">До отпуска</div>
                    <div class="vac-days" id="vac-count">--</div>
                </div>
            </div>
        </div>

        <div class="legend-mini">
            <div class="l-item"><span class="l-dot" style="background: var(--night)"></span> Ночь</div>
            <div class="l-item"><span class="l-dot" style="background: var(--day)"></span> День</div>
            <div class="l-item"><span class="l-dot" style="background: var(--vac)"></span> Отпуск</div>
            <div class="l-item"><span class="l-dot" style="color: var(--text-dim)">●</span> Вых</div>
        </div>

        <div id="calendar-mount"></div>
    </div>

    <script>
        // 1. Регистрация Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
            });
        }

        const YEAR = 2026;
        const START_DATE = new Date(2026, 0, 1);
        const TODAY = new Date();
        TODAY.setHours(0,0,0,0);

        const VACATIONS = [
            { start: new Date(2026, 0, 15), end: new Date(2026, 0, 28) },
            { start: new Date(2026, 6, 16), end: new Date(2026, 7, 1) },
            { start: new Date(2026, 10, 20), end: new Date(2026, 11, 2) }
        ];

        function getShiftType(date) {
            if (VACATIONS.some(v => date >= v.start && date <= v.end)) return 'vacation';
            const diff = Math.round((date - START_DATE) / 86400000);
            const cycle = diff % 56;
            if (cycle >= 0 && cycle <= 13) return 'night';
            if (cycle >= 28 && cycle <= 41) return 'day-sh';
            return 'off';
        }

        function render() {
            const mount = document.getElementById('calendar-mount');
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];

            months.forEach((name, i) => {
                const isPast = new Date(YEAR, i + 1, 0) < TODAY;
                const isCurrent = TODAY.getMonth() === i;

                const box = document.createElement('div');
                box.id = `month-${i}`;
                box.className = `month-box ${isPast ? 'collapsed' : ''}`;
                
                let html = `
                    <div class="month-trigger" onclick="document.getElementById('month-${i}').classList.toggle('collapsed')">
                        <span class="month-title">${name}</span>
                        <span style="opacity: 0.3; font-size: 0.8rem">${isPast ? 'АРХИВ' : '▼'}</span>
                    </div>
                    <div class="month-content">
                        <div class="calendar-grid">
                            ${['пн','вт','ср','чт','пт','сб','вс'].map(d => `<div class="w-day">${d}</div>`).join('')}`;

                const first = new Date(YEAR, i, 1).getDay();
                const offset = first === 0 ? 6 : first - 1;
                for(let e=0; e<offset; e++) html += `<div></div>`;

                const days = new Date(YEAR, i+1, 0).getDate();
                for(let d=1; d<=days; d++) {
                    const cur = new Date(YEAR, i, d);
                    const type = getShiftType(cur);
                    const isToday = cur.getTime() === TODAY.getTime();
                    html += `<div class="d-cell ${type}">${d}${isToday ? '<div class="today-mark"></div>' : ''}</div>`;
                }

                box.innerHTML = html + `</div></div>`;
                mount.appendChild(box);
                
                if(isCurrent) {
                    setTimeout(() => box.scrollIntoView({behavior: 'smooth', block: 'center'}), 100);
                }
            });
        }

        // Обновление виджета отпуска
        const nextVac = VACATIONS.find(v => v.start > TODAY);
        const currentVac = VACATIONS.find(v => TODAY >= v.start && TODAY <= v.end);
        const countEl = document.getElementById('vac-count');
        const labelEl = document.getElementById('vac-label');
        const emojiEl = document.getElementById('vac-emoji');

        if (currentVac) {
            labelEl.innerText = 'Сейчас в отпуске';
            countEl.innerText = Math.ceil((currentVac.end - TODAY)/86400000) + ' дн.';
            emojiEl.innerText = '🏖️';
            document.getElementById('vac-widget').style.background = 'linear-gradient(90deg, rgba(34, 197, 94, 0.1) 0%, transparent 100%)';
        } else if (nextVac) {
            countEl.innerText = Math.ceil((nextVac.start - TODAY)/86400000) + ' дн.';
            emojiEl.innerText = '🗓️';
        }

        // Логика установки
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        const iosHint = document.getElementById('pwa-hint');

        // Для iOS
        if (/iPhone|iPad/.test(navigator.userAgent) && !window.navigator.standalone) {
            iosHint.style.display = 'block';
            setTimeout(() => iosHint.style.opacity = '0', 6000);
        }

        // Для Android/ПК
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        render();
    </script>
</body>
</html>
